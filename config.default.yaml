# =============================================================================
# TTS Cog Settings (text-to-speech feature settings)
# =============================================================================
tts:
  # --- Built-in TTS (Style-Bert-VITS2 compatible) Settings ----------------------------------
  # Model placement root (place in project root)
  model_root: "models/tts-models"
  # Default model directory name to use (auto-select first valid model if not specified)
  default_model_dir: null
  # pyopenjtalk dictionary path (optional)
  pyopenjtalk_dict_dir: null

  # Sampling rate and noise control parameters
  # Discord standard: 48kHz (Discord automatically encodes to ~64kbps with Opus)
  sample_rate: 48000
  noise_scale: 0.667
  noise_w: 0.8
  length_scale: 1.0

  # --- UI/Existing feature default parameters -------------------------------------
  default_model_id: 0          # For existing UI compatibility (referenced when using external API)
  default_style: "Neutral"
  default_style_weight: 5.0
  default_speed: 1.0
  default_volume: 1.0
  enable_say_command: true
  enable_join_leave_notice: true
  join_message_template: "{member_name} has joined."
  leave_message_template: "{member_name} has left."

