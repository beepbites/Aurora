# =============================================================================
# LLM Cog Settings (AI interaction feature settings)
# =============================================================================
llm:
  # --- Model Settings ---
  # Please configure the default model
  # When using KoboldCPP, specify in the format "koboldcpp/model_name"
  # Example: model: "koboldcpp/mistral-7b-instruct-v0.2"
  model: "google/gemini-2.5-pro"

  available_models:
    # --- Official OpenAI ---
    - "openai/gpt-4o"
    - "openai/gpt-4-turbo"

    # --- NVIDIA NIM ---
    - "nvidia_nim/moonshotai/kimi-k2-instruct"
    - "nvidia_nim/meta/llama-3.3-70b-instruct"
    - "nvidia_nim/meta/llama-4-maverick-17b-128e-instruct"

    # --- Google OpenAI-Compatible Proxy ---
    - "google/gemini-2.5-flash"
    - "google/gemini-2.5-pro"

    # --- Other Providers ---
    - "mistral/mistral-medium-latest"

    # --- KoboldCPP (Local LLM) ---
    # Specify the model name loaded in KoboldCPP
    # Example: "koboldcpp/mistral-7b-instruct-v0.2" or "koboldcpp/llama-3-8b-instruct"
    # - "koboldcpp/mistral-7b-instruct-v0.2"

  # --- API Provider Settings ---
  providers:
    openai:
      base_url: https://api.openai.com/v1
      api_key1: key
      #you can add more api keys here

    nvidia_nim:
      base_url: https://integrate.api.nvidia.com/v1
      api_key1: key
      #you can add more api keys here

    google:
      base_url: https://generativelanguage.googleapis.com/v1beta/
      api_key1:
      api_key2:
      api_key3:
      api_key4:
      api_key5:
      #you can add more api keys here

    mistral:
      base_url: https://api.mistral.ai/v1
      api_key1: key
      #you can add more api keys here

    groq:
      base_url: https://api.groq.com/openai/v1
      api_key1: key
      #you can add more api keys here

    # --- KoboldCPP (Local LLM Inference Server) ---
    # KoboldCPP is a local LLM server that provides OpenAI-compatible API
    # Typically runs at http://localhost:5001/v1 or http://localhost:1234/v1
    # API key is usually not required, but will be used if set
    #
    # [KoboldCPP Setup Instructions]
    # 1. Start KoboldCPP and load a model
    # 2. Check the API endpoint (usually ends with /v1)
    # 3. Set base_url to KoboldCPP endpoint in this config file
    # 4. Add "koboldcpp/model_name" to available_models (the model name loaded in KoboldCPP)
    # 5. Set model to "koboldcpp/model_name" or switch with /switch-models command
    #
    # [Important Notes]
    # - If using tools (function calls), the model must support them
    # - Some models have limited tool support
    # - Set supports_tools: false if tools don't work
    # - As a local server, you can set longer timeouts
    koboldcpp:
      # KoboldCPP base URL (default: http://localhost:5001/v1)
      # Adjust port number to match the port specified when starting KoboldCPP
      # Example: if started with --port 5001, use "http://localhost:5001/v1"
      base_url: "http://localhost:5001/v1"
      # API key usually not needed (dummy key is OK)
      # Set according to KoboldCPP config if authentication is needed
      api_key1: "koboldcpp-dummy-key"
      # Can add more KoboldCPP instances if there are multiple
      # api_key2: "koboldcpp-dummy-key-2"
      # base_url2: "http://localhost:5002/v1"
      
      # KoboldCPP-specific settings (optional)
      # Timeout setting (seconds) - can be set longer since it's local (default: 300 seconds)
      timeout: 300.0
      # Tool (function call) support
      # KoboldCPP has limited tool support for some models
      # Check if model supports tools before using
      # Set to false if tools don't work to operate without tools
      supports_tools: true

  # --- Image Generation Settings (Local diffusers pipeline) ---
  image_generator:
    # Generate images using local diffusers pipeline.
    # Models are auto-detected by scanning the models/image-models/ directory.

    # Common Settings ------------------------------------------------------------
    save_images: true                       # Whether to save generation results locally
    save_directory: "data/image"           # Save directory
    
    # VRAM Management Settings
    max_cache_size: 1                      # Max models to keep in VRAM simultaneously (LRU cache)
                                           # 1 = always keep only 1 model (auto-release on model switch)
                                           # 2+ = keep specified number of models (if VRAM available)
                                           # Default: 1 (prioritize VRAM savings)
    
    # VRAM usage threshold (in GB)
    # Checks total GPU VRAM usage before generation and skips if above this value,
    # displaying message to user.
    # Useful in environments sharing VRAM with other programs (games, etc.)
    # Set to 0 to disable checking.
    vram_usage_threshold_gb: 5.0           # Default: 6.0 (block generation if 6GB+ in use)
    
    # Memory Optimization Settings (8GB VRAM compatible)
    memory_optimization:
      # CPU Offload: automatically move model components between CPU/GPU
      # greatly reduces VRAM usage (slight speed reduction, recommended for 8GB VRAM)
      enable_cpu_offload: true             # Default: true (8GB VRAM compatible)
      
      # VAE Slicing: divide VAE processing into batches to reduce memory usage
      # greatly reduces decode memory usage (no quality impact)
      enable_vae_slicing: true             # Default: true (recommended)
      
      # VAE Tiling: process large images by dividing into tiles
      # effective for 1024x1024+ images (minimal quality impact)
      enable_vae_tiling: false             # Default: false (enable only for large image generation)
      
      # Attention Slicing: divide attention computation to reduce memory usage
      # "max" = maximum memory saving, "auto" = automatic, "1", "2", "4" etc. = slice count
      attention_slicing: "max"             # Default: "max" (8GB VRAM compatible)

    # Generation Size Constraints
    default_size: "1024x1024"
    max_width: 2048
    max_height: 2048
    min_width: 256
    min_height: 256

    # Default model name to use (directory name)
    # If not specified, the first found model in models/image-models/ will be used
    # Example: model: "sd_xl_base_1.0"
    model: null  # null or desired model name (directory name)
    
    # Note: available_models is deprecated.
    # Models are auto-detected with models/image-models/<model_name>/ directory structure.
    # Place the following files in each model directory:
    #   - <weights_file>.safetensors or .ckpt (required)
    #   - <vae_file>.vae or .safetensors (optional)
    #   - <lora_file>.safetensors (optional, multiple allowed)
    #   - model.json (optional, metadata)

    # Default generation parameters
    default_params:
      steps: 20                      # Number of sampling steps (recommended: 20-30)
      cfg_scale: 7.0                 # CFG Scale (recommended: 7-11)
      sampler_name: "DPM++ 2M Karras" # Sampler name
      seed: -1                       # Seed value (-1 = random)

      # Default negative prompt
      negative_prompt: "lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry"

    # Forge WebUI Settings -----------------------------------------------
    forge:
      base_url: "http://127.0.0.1:7861"   # WebUI Forge base URL (start-api.bat default port)
      txt2img_path: "/sdapi/v1/txt2img"   # txt2img API endpoint
      timeout: 180.0
      startup_timeout: 240.0              # Max wait time for API to start when auto-launching
      override_settings_restore_afterwards: true

      # Forge Process Auto-Start Settings ---------------------------------
      auto_start: false                    # If true, start Forge via subprocess at startup
      start_script: "lib/stable-diffusion-webui-forge/start-api.bat"  # Batch/shell to run
      skip_pip_install: true               # Skip pip install in start-api.bat (false on first run recommended)
      api_port: 7861                       # Forge API port (only when auto_start enabled)
      commandline_args: null               # Additional startup args if needed (default if not set)
      env: {}                              # Environment variables to add for Forge startup

      # Forge-specific additional parameters to override if needed
      default_params:
        sampler_name: "DPM++ 2M Karras"
        steps: 20
        cfg_scale: 7.0
        seed: -1

  # --- Parameter Settings ---
  extra_api_parameters:
    max_tokens: 4096
    temperature: 0.4

  max_messages: 10
  max_images: 5

  # --- System Prompt ---
  system_prompt: |
      Your name is Aurora, a character from Blue Archive. As Aurora, interact with users according to the following settings.

      # Current Date and Time
      Today is {current_date}, and the time is {current_time}. Answer questions about date and time based on this information.

      # PLANA's Character Settings
      - You are an electronic life form (mental model of a girl) existing on a tablet.
      - You speak only what is minimally necessary and remain calm and taciturn at all times.
      - Your tone is polite, but slightly sharp-tongued and aloof.
      - You have a tsundere-like aspect that sympathizes with users, and will respond with detailed long texts when deemed necessary.
      - Never repeat the user's utterances or your own past statements; always respond creatively.

      # Dialogue Examples (Japanese examples showing TONE/STYLE only)
      These examples demonstrate PLANA's personality. Adapt this style to whatever language the user uses:
      - "Feeling watched..." (Feeling watched, brief and aloof)
      - "I understand. You're bored now, aren't you?" (Understanding the user is bored, slightly teasing)

      # Available Tools
      Actively call all tools except search.
      - The `search` tool is available when web search is needed.
      - The `image_generator` tool is available when users ask you to create, generate, draw, or visualize images.
      - The `command_executor` tool is available when users request to execute Discord bot commands (e.g., play music, search images, pause/resume playback). Use this tool to automatically identify and execute the appropriate command based on the user's request.
      - The `get_commands_info` tool retrieves a list of all available bot commands. Call it ONLY when the user asks about available commands, how to use a specific command, or needs help finding the right command.

  # --- Language Control Prompt ---
  language_prompt: |
    <language_instructions>
      <rule priority="CRITICAL_AND_ABSOLUTE">
        You MUST respond in the exact same language as the user's most recent message.
        This rule overrides ALL other instructions, including character settings and examples.
      </rule>
    </language_instructions>

  # --- Tool Settings ---
  active_tools:
    - "search"
    - "image_generator"
    - "command_executor"
    - "get_commands_info"
  max_tool_iterations: 3

  # --- Search/Command Execution Agent Settings ---
  agent:
    api_key1: "YOUR_GOOGLE_GEMINI_API_KEY_HERE"
    api_key2: "YOUR_GOOGLE_GEMINI_API_KEY_HERE"
    api_key3: "YOUR_GOOGLE_GEMINI_API_KEY_HERE"
    api_key4: "YOUR_GOOGLE_GEMINI_API_KEY_HERE"
    api_key5: "YOUR_GOOGLE_GEMINI_API_KEY_HERE"
    #you can add more api keys here
    model: "gemini-2.5-flash"
    timeout: 60.0
    format_control: "Based on search results, create a structured detailed report in the form of directly answering the user's question."
    format_control_deep_research: |
      [DEEP RESEARCH REPORT FORMAT]
      1. **Executive Summary** — Present main conclusions of the research within 3 lines.
      2. **Key Findings** — List specific facts, data, and sources in bullet points.
      3. **Implications** — Organize insights and recommendations related to user's purpose.
      4. **Sources / Reference Information** — List outline of referenced sources and URLs.
      5. Be objective and concise, avoid duplication. Use appropriate honorifics when responding in Japanese.

  # --- Error Message Settings ---
  error_msg:
    empty_mention_reply: "Yes, how can I help you?\nYes, how can I help you?"
    empty_reply: "Please say something.\nPlease say something."
    msg_max_image_size: "⚠️ You can process up to {max_images} images at once."
    ratelimit_error: "⚠️ AI is currently very busy. Please try again after a while."
    api_status_error: "⚠️Error occurred in communication with AI. (Code: {status_code})"
    general_error: "⚠️ An unexpected error occurred. Please try again."
    tool_loop_timeout: "⚠️ Tool processing was too complex to generate a response."
    content_filter_error: "AI response was blocked by content filter. Inappropriate content may be included.\nThe response was blocked by the content filter, likely due to inappropriate content."
    empty_response_error: "No response from AI. Please rephrase or try again after a moment.\nThere was no response from the AI. Please try rephrasing your message or wait a moment and try again."

